<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Throughput Recorder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 15px;
        background: #f4f4f4;
        color: #222;
    }

    h1 {
        font-size: 1.5rem;
        margin-bottom: 10px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
        width: 100%;
        padding: 18px;
        font-size: 1.2rem;
        border: none;
        border-radius: 10px;
        margin-top: 10px;
        cursor: pointer;
    }

    .record-btn {
        background: #007bff;
        color: white;
    }

    .summary-btn {
        background: #28a745;
        color: white;
    }

    .download-btn {
        background: #ff9800;
        color: white;
    }

    .reset-btn {
        background: #dc3545;
        color: white;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 1rem;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    table, th, td {
        border: 1px solid #ccc;
    }

    th, td {
        padding: 8px;
        text-align: center;
        font-size: 0.9rem;
    }

    canvas {
        margin-top: 20px;
    }

    .stats {
        line-height: 1.8;
        font-size: 1rem;
    }
</style>
</head>

<body>

<h1>Throughput Recorder</h1>

<div class="card">
    <label>Service Name</label>
    <input type="text" id="serviceName" placeholder="e.g. Self Checkout 1">

    <button class="record-btn" onclick="recordEvent()">RECORD EVENT</button>
</div>

<div class="card">
    <div class="stats" id="summary">
        No data recorded yet.
    </div>

    <button class="summary-btn" onclick="generateSummary()">GENERATE SUMMARY</button>
    <button class="download-btn" onclick="downloadCSV()">DOWNLOAD CSV</button>
    <button class="reset-btn" onclick="resetData()">RESET DATA</button>

    <canvas id="throughputChart"></canvas>
</div>

<div class="card">
    <h3>Recorded Events</h3>
    <table id="dataTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Timestamp</th>
                <th>Interval (sec)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>

let records = [];
let chart = null;

updateTable();

function recordEvent() {

    const service = document.getElementById("serviceName").value || "Unnamed_Service";

    const timestamp = new Date();

    let interval = null;

    if (records.length > 0) {
        const previous = new Date(records[records.length - 1].timestamp);
        interval = (timestamp - previous) / 1000;
    }

    const record = {
        service,
        timestamp: timestamp.toISOString(),
        interval
    };

    records.push(record);

    updateTable();
}

function updateTable() {

    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    records.forEach((r, index) => {

        const row = `
            <tr>
                <td>${index + 1}</td>
                <td>${new Date(r.timestamp).toLocaleString()}</td>
                <td>${r.interval ? r.interval.toFixed(2) : "-"}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });
}

function generateSummary() {

    if (records.length < 2) {
        alert("Need at least 2 records.");
        return;
    }

    const intervals = records
        .map(r => r.interval)
        .filter(v => v !== null);

    const avgInterval =
        intervals.reduce((a,b) => a+b, 0) / intervals.length;

    const throughputPerHour = 3600 / avgInterval;

    const totalTime =
        (new Date(records[records.length - 1].timestamp) -
        new Date(records[0].timestamp)) / 1000;

    document.getElementById("summary").innerHTML = `
        <b>Total Events:</b> ${records.length}<br>
        <b>Average Interval:</b> ${avgInterval.toFixed(2)} sec<br>
        <b>Estimated Throughput:</b> ${throughputPerHour.toFixed(1)} persons/hour<br>
        <b>Total Observation Time:</b> ${totalTime.toFixed(1)} sec
    `;

    createChart(intervals);
}

function createChart(intervals) {

    const ctx = document.getElementById("throughputChart");

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: intervals.map((_, i) => i + 1),
            datasets: [{
                label: 'Interarrival Time (sec)',
                data: intervals,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Event Number'
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: 'Seconds'
                    }
                }
            }
        }
    });
}

function downloadCSV() {

    if (records.length < 2) {
        alert("Not enough data to export.");
        return;
    }

    const serviceName =
        (document.getElementById("serviceName").value || "throughput_data")
        .replace(/\s+/g, "_");

    let csv = "Event_Number,Interval_Seconds\n";

    records
        .filter(r => r.interval !== null)
        .forEach((r, index) => {

            csv += `${index + 1},"${r.interval.toFixed(2)}"\n`;

        });

    const blob = new Blob([csv], { type: 'text/csv' });

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;
    a.download = `${serviceName}.csv`;

    a.click();

    URL.revokeObjectURL(url);
}

function resetData() {

    if (!confirm("Delete all recorded data?")) {
        return;
    }

    records = [];

    updateTable();

    document.getElementById("summary").innerHTML =
        "No data recorded yet.";

    if (chart) {
        chart.destroy();
    }
}

</script>

</body>
</html>
